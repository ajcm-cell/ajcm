<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJCM Association</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        header {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }
        .language-switcher {
            float: right;
            margin-top: -40px;
        }
        main {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        .registration-form {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
    <script>
        function switchLanguage(lang) {
            document.querySelector('html').setAttribute('lang', lang);
            // Additional language support mechanisms can be added here.
        }
    </script>
</head>
<body>
    <header>
        <h1>AJCM Association</h1>
        <div class="language-switcher">
            <button onclick="switchLanguage('en')">EN</button>
            <button onclick="switchLanguage('fr')">FR</button>
            <button onclick="switchLanguage('ar')">AR</button>
        </div>
    </header>
    <main>
        <section>
            <h2>Welcome to the AJCM Association</h2>
            <p>Your one-stop destination for events, archives, and resources.</p>
        </section>
        <section>
            <h2>Event Registration</h2>
            <form action="https://formspree.io/f/your-form-id" method="POST" class="registration-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your name">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
                <button type="submit">Register</button>
            </form>
        </section>
        <section>
            <h2>Archives</h2>
            <p>Explore our archives for past events and publications.</p>
            <a href="#">View Archives</a>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 AJCM Association. All rights reserved.</p>
    </footer>
</body>
</html>
